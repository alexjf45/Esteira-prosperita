<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importar Estoque — Auto Prosperità</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--bg:#0E0E10;--bg2:#16161A;--bg3:#1E1E24;--border:#2A2A34;--text:#F0EDE6;--text2:#A09A8E;--green:#4CAF7D;--green-bg:#0E1F16;--red:#E05252;--red-bg:#2A1414;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px 24px;width:100%;max-width:480px;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:.5px;margin-bottom:4px;}
.logo span{color:var(--gold);}
.titulo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;margin-bottom:6px;}
.sub{color:var(--text2);font-size:13px;margin-bottom:24px;line-height:1.5;}
.btn{width:100%;background:var(--gold);color:#000;border:none;padding:14px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.log{margin-top:20px;display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;}
.log-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);font-size:12px;}
.log-item.ok{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.log-item.err{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.log-item.info{color:var(--text2);}
.log-icon{font-size:14px;flex-shrink:0;}
.resumo{margin-top:16px;padding:14px;border-radius:10px;background:var(--green-bg);border:1px solid var(--green);display:none;}
.resumo-txt{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--green);}
.resumo-sub{font-size:12px;color:var(--text2);margin-top:3px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">AUTO <span>PROSPERITÀ</span></div>
  <div class="titulo">Importar Estoque</div>
  <div class="sub">30 veículos identificados na planilha.<br>Todos entrarão na etapa <strong style="color:var(--gold)">🔍 Vistoria / Avaliação</strong> com checklist zerado.</div>
  <button class="btn" id="btnImportar" onclick="importar()">🚀 Subir Estoque Agora</button>
  <div class="log" id="log"></div>
  <div class="resumo" id="resumo">
    <div class="resumo-txt" id="resumo-txt"></div>
    <div class="resumo-sub">Abra o app da esteira — todos os veículos já estão lá.</div>
  </div>
</div>

<script type="module">

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const veiculosRef = ref(db, 'veiculos');

const CHECKLIST_SIZE = 20; // mesmo tamanho do app

const ESTOQUE = [

  { placa:"FDC1790", marca:"VolksWagen", modelo:"FOX",               versao:"Highline I Motion 1.6 Flex 16V 5p",  ano:"2015", venda:"41.990"  },
  { placa:"SUS3C75", marca:"Jeep",       modelo:"COMMANDER",         versao:"Limited T270 1.3 TB Flex Aut.",      ano:"2024", venda:"157.990" },
  { placa:"ETQ1B35", marca:"Chevrolet",  modelo:"TRACKER",           versao:"LT 1.4 Turbo 16V Flex 4x2 Aut.",    ano:"2019", venda:"78.990"  },
  { placa:"EUI5D98", marca:"Ducati",     modelo:"PANIGALE",          versao:"V4 S",                               ano:"2020", venda:"90.990"  },
  { placa:"AXZ9J77", marca:"Land Rover", modelo:"DISCOVERY",         versao:"SE 3.0 V6 4x4 Aut.",                ano:"2017", venda:"182.990" },
  { placa:"RYK1G26", marca:"Audi",       modelo:"Q5",                versao:"Prestige 2.0 TFSI Quattro S tronic", ano:"2023", venda:"245.990" },

  { placa:"EUN3633", marca:"Nissan",     modelo:"LIVINA",            versao:"X-Gear SL 1.6 16V Flex Fuel Mec.", ano:"2012", venda:"32.990"  },

function log(msg, tipo='info') {
  const div = document.getElementById('log');
  const item = document.createElement('div');
  item.className = `log-item ${tipo}`;
  const icons = { ok:'✅', err:'❌', info:'⏳' };
  item.innerHTML = `<span class="log-icon">${icons[tipo]||'•'}</span><span>${msg}</span>`;
  div.appendChild(item);
  div.scrollTop = div.scrollHeight;
}

window.importar = async function() {
  const btn = document.getElementById('btnImportar');
  btn.disabled = true;
  btn.textContent = 'Importando...';
  document.getElementById('log').innerHTML = '';

  let ok = 0, err = 0;
  const now = Date.now();

  for (const v of ESTOQUE) {
    try {
      const modelo = `${v.marca} ${v.modelo}`.toUpperCase();
      const dados = {
        modelo,
        versao:  v.versao,
        placa:   v.placa.toUpperCase(),
        ano:     v.ano,
        cor:     '',
        km:      '',
        venda:   v.venda,
        status:  'vistoria',
        checklist:    Array(CHECKLIST_SIZE).fill(false),
        entradaEtapa: now,
        criadoEm:     now,
        historico: [{ etapa:'Vistoria / Avaliação', emoji:'🔍', ts: now, duracaoMs: null }]
      };
      await push(veiculosRef, dados);
      log(`${modelo} — ${v.placa}`, 'ok');
      ok++;
    } catch(e) {
      log(`Erro: ${v.placa} — ${e.message}`, 'err');
      err++;
    }
    // pequena pausa para não sobrecarregar
    await new Promise(r => setTimeout(r, 80));
  }

  const resumo = document.getElementById('resumo');
  document.getElementById('resumo-txt').textContent =
    `✅ ${ok} veículo${ok!==1?'s':''} importado${ok!==1?'s':''} com sucesso${err>0?' ('+err+' erro'+( err!==1?'s':'')+')':''}!`;
  resumo.style.display = 'block';
  btn.textContent = 'Concluído!';
};
</script>
</body>
</html>
