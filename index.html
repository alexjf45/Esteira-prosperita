<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Auto Prosperità — Esteira</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>

/* ── TEMA ESCURO (padrão / noturno) ──────────────────── */
:root {
  --gold:#C9A84C; --gold-light:#E8C97A; --gold-dark:#8B6914;
  --gold-muted:rgba(201,168,76,.12);
  --bg:#0A0A0C; --bg2:#111114; --bg3:#18181D; --bg4:#202028;
  --bg5:#28282F;
  --text:#F2EEE6; --text2:#9A9488; --text3:#52504A;
  --border:#252530; --border2:#2F2F3C;
  --shadow:0 4px 24px rgba(0,0,0,.55);
  --shadow-card:0 2px 10px rgba(0,0,0,.4);
  --yellow:#F5C518; --red:#D94F4F; --red-bg:#1E0F0F;
  --yellow-bg:#1A1600; --green:#3DAA6A; --green-bg:#0A1910;
  --header-blur:blur(18px);
  --header-bg:rgba(10,10,12,.88);
}

/* ── TEMA CLARO (diurno 05h–18h) ──────────────────────── */
body.light {
  --bg:#F4F1EC; --bg2:#FDFCFA; --bg3:#EDE9E2; --bg4:#E4DFD6;
  --bg5:#D8D2C8;
  --text:#1A1714; --text2:#6B6560; --text3:#B0A99E;
  --border:#D9D3CA; --border2:#CFC8BE;
  --shadow:0 4px 24px rgba(0,0,0,.10);
  --shadow-card:0 2px 10px rgba(0,0,0,.07);
  --red-bg:#FDF0F0; --yellow-bg:#FDFBF0; --green-bg:#F0FBF5;
  --header-bg:rgba(244,241,236,.92);
}

* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Barlow',sans-serif; min-height:100vh;
  transition:background .4s, color .3s;
}

/* ── HEADER ─────────────────────────────────────────── */
.header {
  background:var(--header-bg);
  backdrop-filter:var(--header-blur);
  -webkit-backdrop-filter:var(--header-blur);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.header-logo-img {
  height:42px; width:auto;
  filter:drop-shadow(0 1px 4px rgba(0,0,0,.3));
  transition:filter .3s;
}
body.light .header-logo-img {
  filter:drop-shadow(0 1px 4px rgba(0,0,0,.12)) brightness(.92);
}
.header-right { display:flex; align-items:center; gap:8px; }
.theme-badge {
  font-size:10px; font-weight:600; color:var(--text2);
  letter-spacing:.3px; padding:3px 8px;
  border:1px solid var(--border); border-radius:20px;
  background:var(--bg3);
}
.btn-icon {
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text2); border-radius:8px;
  width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; transition:all .15s;
}
.btn-icon:hover { border-color:var(--gold); color:var(--gold); }

/* ── LEGENDA ─────────────────────────────────────────── */
.legenda {
  display:flex; gap:12px; align-items:center;
  padding:7px 16px; background:var(--bg2);
  border-bottom:1px solid var(--border);
  font-size:10px; color:var(--text2); flex-wrap:wrap;
}
.leg-item { display:flex; align-items:center; gap:4px; }
.leg-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.leg-ok   { background:var(--bg5); border:1px solid var(--border2); }
.leg-warn { background:var(--yellow); }
.leg-crit { background:var(--red); }

/* ── BOARD ───────────────────────────────────────────── */
.board { padding:12px; display:flex; flex-direction:column; gap:10px; }

/* ── COLUNA ──────────────────────────────────────────── */
.coluna {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:12px; overflow:hidden;
  box-shadow:var(--shadow-card);
  transition:background .3s, border-color .3s;
}
.coluna-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 15px; cursor:pointer; user-select:none;
  transition:background .15s;
}
.coluna-header:hover { background:var(--bg3); }
.col-left  { display:flex; align-items:center; gap:9px; }
.col-emoji { font-size:15px; }
.col-nome  {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700; font-size:14px;
  text-transform:uppercase; letter-spacing:.5px;
}
.col-right { display:flex; align-items:center; gap:8px; }
.col-count {
  background:var(--bg4); border:1px solid var(--border2);
  color:var(--text2); font-size:11px; font-weight:700;
  padding:2px 8px; border-radius:20px; min-width:26px; text-align:center;
}
.col-count.alerta { background:var(--red-bg); border-color:var(--red); color:var(--red); }
.col-chevron { color:var(--text3); font-size:11px; transition:transform .2s; }
.coluna.collapsed .col-chevron { transform:rotate(-90deg); }
.coluna-body { padding:0 10px 10px; display:flex; flex-direction:column; gap:7px; }
.coluna.collapsed .coluna-body { display:none; }

/* ── CARD ────────────────────────────────────────────── */
.card {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:9px; overflow:hidden; cursor:pointer;
  transition:border-color .15s, transform .1s, box-shadow .15s;
  box-shadow:var(--shadow-card);
}
.card:hover  { border-color:var(--border2); box-shadow:0 4px 18px rgba(0,0,0,.2); }
.card:active { transform:scale(.98); }
.card.warn-y { border-left:3px solid var(--yellow); }
.card.warn-r { border-left:3px solid var(--red); background:var(--red-bg); }
.card-top    { padding:10px 12px 8px; }
.card-modelo {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700; font-size:15px; letter-spacing:.3px;
}
.card-versao { font-size:10px; color:var(--text2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-info   { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }
.badge {
  font-size:10px; font-weight:600; color:var(--text2);
  background:var(--bg4); border:1px solid var(--border);
  padding:2px 6px; border-radius:4px;
}
.badge.venda { color:var(--gold); border-color:rgba(201,168,76,.3); background:var(--gold-muted); }
.card-prazo {
  display:flex; align-items:center; gap:5px;
  padding:5px 12px; border-top:1px solid var(--border);
  font-size:11px; font-weight:600;
}
.card-prazo.ok   { color:var(--text3); }
.card-prazo.warn { color:var(--yellow); background:var(--yellow-bg); }
.card-prazo.crit { color:var(--red); background:var(--red-bg); }
.prog-mini { height:2px; background:var(--border); }
.prog-mini-fill { height:100%; background:linear-gradient(90deg,var(--gold-dark),var(--gold)); transition:width .3s; }

/* ── FORM ────────────────────────────────────────────── */
.form-wrap {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:12px; padding:16px; margin-bottom:4px; display:none;
  box-shadow:var(--shadow);
}
.form-wrap.open { display:block; }
.form-title {
  font-family:'Barlow Condensed',sans-serif; font-weight:800;
  font-size:16px; text-transform:uppercase; color:var(--gold); margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}
.field-row    { display:flex; gap:8px; margin-bottom:9px; }
.field-group  { flex:1; display:flex; flex-direction:column; }
.field-label  {
  font-size:9px; font-weight:700; color:var(--text2);
  text-transform:uppercase; letter-spacing:.8px; margin-bottom:4px;
}
.field-input {
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text); border-radius:7px; padding:9px 11px;
  font-size:13px; font-family:'Barlow',sans-serif;
  outline:none; width:100%; transition:border-color .15s;
}
.field-input:focus { border-color:var(--gold); }
.field-input option { background:var(--bg3); }
.btn-salvar {
  width:100%; background:linear-gradient(135deg,var(--gold-dark),var(--gold));
  color:#000; border:none; padding:12px;
  border-radius:8px; font-family:'Barlow Condensed',sans-serif;
  font-size:15px; font-weight:800; text-transform:uppercase;
  letter-spacing:.5px; cursor:pointer; margin-top:4px;
  transition:opacity .15s;
}
.btn-salvar:active { opacity:.85; }
.btn-add {
  width:100%; background:transparent;
  border:1px dashed var(--border2); color:var(--text3);
  border-radius:8px; padding:10px; font-size:12px; font-weight:600;
  cursor:pointer; display:flex; align-items:center;
  justify-content:center; gap:6px; transition:all .15s;
}
.btn-add:hover { border-color:var(--gold); color:var(--gold); }
.vazio { text-align:center; padding:20px 10px; color:var(--text3); font-size:13px; }

/* ── MODAL ───────────────────────────────────────────── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.65);
  z-index:200; display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--bg2); border-radius:18px 18px 0 0;
  border:1px solid var(--border); border-bottom:none;
  width:100%; max-width:540px; max-height:92vh;
  overflow-y:auto; padding:18px;
  transform:translateY(24px); transition:transform .25s;
  box-shadow:0 -8px 40px rgba(0,0,0,.4);
}
.overlay.open .modal { transform:translateY(0); }
.modal-handle {
  width:38px; height:4px; background:var(--border2);
  border-radius:2px; margin:0 auto 18px;
}
.modal-eyebrow {
  font-size:9px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--gold); margin-bottom:4px;
}
.modal-title {
  font-family:'Barlow Condensed',sans-serif; font-weight:800;
  font-size:24px; margin-bottom:2px; letter-spacing:.3px;
}
.modal-versao { font-size:11px; color:var(--text2); margin-bottom:4px; }
.modal-sub    { color:var(--text2); font-size:12px; margin-bottom:16px; }

/* PRAZO */
.prazo-card {
  border-radius:10px; padding:11px 14px; margin-bottom:14px;
  display:flex; align-items:center; gap:11px;
}
.prazo-card.ok   { background:var(--bg3); border:1px solid var(--border); }
.prazo-card.warn { background:var(--yellow-bg); border:1px solid var(--yellow); }
.prazo-card.crit { background:var(--red-bg); border:1px solid var(--red); }
.prazo-card-icon { font-size:20px; }
.prazo-card-txt b { display:block; font-size:13px; font-weight:700; }
.prazo-card.ok   .prazo-card-txt b { color:var(--text2); }
.prazo-card.warn .prazo-card-txt b { color:var(--yellow); }
.prazo-card.crit .prazo-card-txt b { color:var(--red); }
.prazo-card-txt small { font-size:11px; opacity:.65; }

/* HISTÓRICO */
.section-title {
  font-size:9px; font-weight:700; text-transform:uppercase;
  letter-spacing:1px; color:var(--gold); margin-bottom:8px;
  display:flex; align-items:center; gap:6px;
}
.hist-list { display:flex; flex-direction:column; gap:0; margin-bottom:14px; }
.hist-item {
  display:flex; gap:10px; padding:8px 0;
  border-bottom:1px solid var(--border); align-items:flex-start;
}
.hist-item:last-child { border-bottom:none; }
.hist-line { display:flex; flex-direction:column; align-items:center; padding-top:4px; }
.hist-dot  { width:8px; height:8px; border-radius:50%; background:var(--border2); flex-shrink:0; }
.hist-dot.atual { background:var(--gold); box-shadow:0 0 6px rgba(201,168,76,.5); }
.hist-info { flex:1; }
.hist-etapa { font-size:13px; font-weight:600; }
.hist-data  { font-size:10px; color:var(--text3); margin-top:1px; }
.hist-dur   { font-size:10px; color:var(--text2); margin-top:1px; }
.hist-vazio { font-size:12px; color:var(--text3); padding:8px 0; margin-bottom:14px; }

/* STATUS */
.status-wrap  { margin-bottom:14px; }
.status-btns  { display:flex; gap:6px; flex-wrap:wrap; }
.status-btn {
  font-size:11px; font-weight:600; padding:6px 10px;
  border-radius:7px; border:1px solid var(--border);
  background:var(--bg3); color:var(--text2); cursor:pointer;
  transition:all .15s;
}
.status-btn.active {
  border-color:var(--gold); color:var(--gold);
  background:var(--gold-muted);
}

/* CHECKLIST */
.check-section  { margin-bottom:12px; }
.check-sec-hdr  {
  font-size:9px; font-weight:700; text-transform:uppercase;
  letter-spacing:1px; margin-bottom:6px;
  display:flex; align-items:center; gap:6px;
}
.etapa-badge {
  font-size:8px; padding:2px 6px; border-radius:10px; font-weight:700;
}
.etapa-atual  { background:var(--gold-muted); color:var(--gold); border:1px solid rgba(201,168,76,.3); }
.etapa-outro  { background:var(--bg4); color:var(--text3); border:1px solid var(--border); }
.check-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 10px; border-radius:7px;
  background:var(--bg3); border:1px solid var(--border);
  margin-bottom:4px; cursor:pointer; transition:background .1s;
}
.check-item.dimmed { opacity:.4; }
.check-item:active { background:var(--bg4); }
.check-box {
  width:18px; height:18px; border-radius:5px;
  border:1.5px solid var(--border2); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; transition:all .15s;
}
.check-item.done .check-box { background:var(--gold); border-color:var(--gold); color:#000; }
.check-item.done .check-txt { text-decoration:line-through; color:var(--text3); }
.check-txt { font-size:13px; }

/* PROGRESSO MODAL */
.prog-wrap { margin-bottom:14px; }
.prog-label {
  display:flex; justify-content:space-between;
  font-size:10px; color:var(--text2); margin-bottom:5px;
}
.prog-bar { height:5px; background:var(--bg4); border-radius:3px; overflow:hidden; }
.prog-fill {
  height:100%;
  background:linear-gradient(90deg,var(--gold-dark),var(--gold));
  border-radius:3px; transition:width .3s;
}

/* AÇÕES */
.modal-actions { display:flex; gap:8px; margin-top:18px; }
.btn-action {
  flex:1; padding:12px; border-radius:9px;
  font-size:13px; font-weight:700;
  font-family:'Barlow Condensed',sans-serif;
  letter-spacing:.5px; text-transform:uppercase;
  cursor:pointer; border:none; transition:opacity .15s;
}
.btn-action:active { opacity:.8; }
.btn-primary { background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:#000; }
.btn-danger  { background:var(--red-bg); color:var(--red); border:1px solid var(--red); }
.btn-danger:hover { background:var(--red); color:#fff; }

/* DIVISOR */
.divider {
  height:1px; background:var(--border);
  margin:14px 0;
}

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
</style>
</head>

    <div class="prazo-card" id="m-prazo">
      <div class="prazo-card-icon" id="m-prazo-icon"></div>
      <div class="prazo-card-txt">
        <b id="m-prazo-txt"></b>
        <small id="m-prazo-detalhe"></small>
      </div>
    </div>

    <div class="prog-wrap">
      <div class="prog-label"><span>Progresso geral</span><span id="m-prog-txt">0/0</span></div>
      <div class="prog-bar"><div class="prog-fill" id="m-prog-fill" style="width:0%"></div></div>
    </div>

    <div class="status-wrap">
      <div class="section-title">↔ Mover para etapa</div>
      <div class="status-btns" id="m-status-btns"></div>
    </div>

    <div class="divider"></div>

    <div class="section-title" style="margin-bottom:8px">📋 Histórico de movimentação</div>
    <div id="m-historico"></div>

    <div class="divider"></div>

    <div id="m-checklist"></div>

    <div class="modal-actions">
      <button class="btn-action btn-primary" onclick="salvarModal()">Salvar</button>
      <button class="btn-action btn-danger" onclick="excluirVeiculo()">Excluir</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNInPCmUuqh3VXkIuYX7FyuqpNNmz0BX8",
  authDomain: "auto-prosperita.firebaseapp.com",
  databaseURL: "https://auto-prosperita-default-rtdb.firebaseio.com",
  projectId: "auto-prosperita",
  storageBucket: "auto-prosperita.firebasestorage.app",
  messagingSenderId: "522429666183",
  appId: "1:522429666183:web:31cc54504aebfe363a7922"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const veiculosRef = ref(db, 'veiculos');

// ── TEMA AUTOMÁTICO ───────────────────────────────────────
function aplicarTema() {
  const h = new Date().getHours();
  const diurno = h >= 5 && h < 18;
  document.body.classList.toggle('light', diurno);
  document.getElementById('themeBadge').textContent = diurno ? '☀️ Diurno' : '🌙 Noturno';
}
aplicarTema();
setInterval(aplicarTema, 60000);

// ── PRAZO ─────────────────────────────────────────────────
const PRAZO_WARN = 3, PRAZO_CRIT = 7;
function diasNaEtapa(v) {
  if (!v.entradaEtapa) return 0;
  return Math.floor((Date.now() - v.entradaEtapa) / 86400000);
}
function prazoClass(d) { return d >= PRAZO_CRIT ? 'crit' : d >= PRAZO_WARN ? 'warn' : 'ok'; }
function prazoIcon(c)  { return c === 'crit' ? '🔴' : c === 'warn' ? '🟡' : '⚪'; }
function prazoTexto(d, nome) {
  const s = d === 0 ? 'hoje' : d === 1 ? '1 dia' : d + ' dias';
  return d === 0 ? 'Entrou hoje em ' + nome : nome + ' há ' + s;
}

// ── CHECKLIST ─────────────────────────────────────────────
const CHECKLIST = [
  { texto:'Vistoria estrutural feita',            etapa:'vistoria'  },
  { texto:'Motor e câmbio verificados',           etapa:'vistoria'  },
  { texto:'Pneus e suspensão OK',                 etapa:'vistoria'  },
  { texto:'Elétrica verificada',                  etapa:'vistoria'  },
  { texto:'Ar-condicionado testado',              etapa:'vistoria'  },
  { texto:'Lataria inspecionada',                 etapa:'funilaria' },
  { texto:'Pintura aprovada / em andamento',      etapa:'funilaria' },
  { texto:'Funilaria concluída',                  etapa:'funilaria' },
  { texto:'CRV / DUT em mão',                     etapa:'doc'       },
  { texto:'Multas verificadas',                   etapa:'doc'       },
  { texto:'Licenciamento em dia',                 etapa:'doc'       },
  { texto:'Restrições no Detran verificadas',     etapa:'doc'       },
  { texto:'IPVA em dia',                          etapa:'doc'       },
  { texto:'Higienização completa',                etapa:'venda'     },
  { texto:'Fotos feitas',                         etapa:'venda'     },
  { texto:'Preço definido',                       etapa:'venda'     },
  { texto:'Anúncio publicado',                    etapa:'venda'     },
  { texto:'Contrato assinado',                    etapa:'venda'     },
  { texto:'Pagamento confirmado',                 etapa:'venda'     },
  { texto:'Chave e documentação entregues',       etapa:'venda'     },
];
const ETAPAS_CHECK = [
  { etapa:'vistoria',  label:'Vistoria',     emoji:'🔍' },
  { etapa:'funilaria', label:'Funilaria',    emoji:'🔧' },
  { etapa:'doc',       label:'Documentação', emoji:'📄' },
  { etapa:'venda',     label:'Venda',        emoji:'🏷️' },
];

// ── COLUNAS ───────────────────────────────────────────────
const COLUNAS = [
  { status:'vistoria',  nome:'Vistoria / Avaliação', emoji:'🔍' },
  { status:'funilaria', nome:'Funilaria / Mecânica',  emoji:'🔧' },
  { status:'doc',       nome:'Aguardando Documentos', emoji:'📄' },
  { status:'venda',     nome:'À Venda',               emoji:'🏷️' },
];

// ── ESTADO ────────────────────────────────────────────────
let veiculos = {}, veiculoAtual = null, checkAtual = [];

// ── HELPERS ───────────────────────────────────────────────
function fmtData(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})
    + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function nomEtapa(s) { return COLUNAS.find(c=>c.status===s)?.nome || s; }
function duracao(ms) {
  const d = Math.floor(ms/86400000), h = Math.floor((ms%86400000)/3600000);
  return d > 0 ? d+'d '+h+'h' : h+'h';
}

// ── RENDER BOARD ──────────────────────────────────────────
function renderBoard() {
  const cont = document.getElementById('colunas');
  cont.innerHTML = '';
  COLUNAS.forEach(col => {
    const lista = Object.entries(veiculos)
      .filter(([,v]) => v.status === col.status)
      .sort((a,b) => (a[1].entradaEtapa||0) - (b[1].entradaEtapa||0));
    const alertCount = lista.filter(([,v]) => diasNaEtapa(v) >= PRAZO_WARN).length;

    const div = document.createElement('div');
    div.className = 'coluna collapsed';

    const hdr = document.createElement('div');
    hdr.className = 'coluna-header';
    hdr.innerHTML = `
      <div class="col-left">
        <span class="col-emoji">${col.emoji}</span>
        <span class="col-nome">${col.nome}</span>
      </div>
      <div class="col-right">
        <span class="col-count${alertCount>0?' alerta':''}">${lista.length}</span>
        <span class="col-chevron">▼</span>
      </div>`;
    hdr.onclick = () => div.classList.toggle('collapsed');
    div.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'coluna-body';

    if (!lista.length) {
      body.innerHTML = '<div class="vazio">Nenhum veículo nesta etapa</div>';
    } else {
      lista.forEach(([id, v]) => {
        const dias = diasNaEtapa(v);
        const cls  = prazoClass(dias);
        const total = CHECKLIST.length;
        const feitos = (v.checklist||[]).filter(Boolean).length;
        const pct = Math.round(feitos/total*100);

        const card = document.createElement('div');
        card.className = `card${cls==='warn'?' warn-y':cls==='crit'?' warn-r':''}`;
        card.innerHTML = `
          <div class="card-top">
            <div class="card-modelo">${v.modelo||'—'}</div>
            ${v.versao ? `<div class="card-versao">${v.versao}</div>` : ''}
            <div class="card-info">
              ${v.placa  ? `<span class="badge">${v.placa}</span>` : ''}
              ${v.ano    ? `<span class="badge">${v.ano}</span>` : ''}
              ${v.cor    ? `<span class="badge">${v.cor}</span>` : ''}
              ${v.km     ? `<span class="badge">${v.km} km</span>` : ''}
              ${v.venda  ? `<span class="badge venda">R$ ${v.venda}</span>` : ''}
            </div>
          </div>
          <div class="card-prazo ${cls}">
            <span>${prazoIcon(cls)}</span>
            ${prazoTexto(dias, col.nome)}
          </div>
          <div class="prog-mini">
            <div class="prog-mini-fill" style="width:${pct}%"></div>
          </div>`;
        card.onclick = () => abrirModal(id);
        body.appendChild(card);
      });
    }

    const btnAdd = document.createElement('button');
    btnAdd.className = 'btn-add';
    btnAdd.innerHTML = '＋ Adicionar veículo';
    btnAdd.onclick = () => {
      document.getElementById('f-status').value = col.status;
      document.getElementById('formWrap').classList.add('open');
      document.getElementById('formWrap').scrollIntoView({behavior:'smooth'});
    };
    body.appendChild(btnAdd);
    div.appendChild(body);
    cont.appendChild(div);
  });
}

// ── MODAL ─────────────────────────────────────────────────
function abrirModal(id) {
  veiculoAtual = id;
  const v   = veiculos[id];
  const dias = diasNaEtapa(v);
  const cls  = prazoClass(dias);
  const col  = COLUNAS.find(c=>c.status===v.status);

  document.getElementById('m-etapa-label').textContent = (col?.emoji||'') + ' ' + (col?.nome||'');
  document.getElementById('m-titulo').textContent  = v.modelo || '—';
  document.getElementById('m-versao').textContent  = v.versao || '';
  document.getElementById('m-sub').textContent =
    [v.placa, v.ano, v.cor, v.km?v.km+' km':'', v.venda?'R$ '+v.venda:''].filter(Boolean).join(' · ');

  // prazo
  const pc = document.getElementById('m-prazo');
  pc.className = 'prazo-card ' + cls;
  document.getElementById('m-prazo-icon').textContent = prazoIcon(cls);
  document.getElementById('m-prazo-txt').textContent  = prazoTexto(dias, col?.nome||'');
  const msgs = { ok:'Dentro do prazo ✓', warn:'Atenção: +3 dias nesta etapa', crit:'Urgente: passou de 7 dias — verifique o gargalo' };
  document.getElementById('m-prazo-detalhe').textContent = msgs[cls];

  // status btns
  const sb = document.getElementById('m-status-btns');
  sb.innerHTML = '';
  COLUNAS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'status-btn' + (v.status===c.status?' active':'');
    b.dataset.status = c.status;
    b.textContent = c.emoji + ' ' + c.nome;
    b.onclick = () => { sb.querySelectorAll('.status-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
    sb.appendChild(b);
  });

  // histórico
  const cont = document.getElementById('m-historico');
  const hist  = v.historico || [];
  if (!hist.length) {
    cont.innerHTML = '<div class="hist-vazio">Nenhuma movimentação registrada.</div>';
  } else {
    const sorted = [...hist].sort((a,b)=>(b.ts||0)-(a.ts||0));
    cont.innerHTML = '';
    const lista = document.createElement('div');
    lista.className = 'hist-list';
    sorted.forEach((h,i) => {
      const item = document.createElement('div');
      item.className = 'hist-item';
      const dur = h.duracaoMs ? 'Ficou ' + duracao(h.duracaoMs) : '';
      item.innerHTML = `
        <div class="hist-line"><div class="hist-dot${i===0?' atual':''}"></div></div>
        <div class="hist-info">
          <div class="hist-etapa">${h.emoji||''} ${h.etapa||'—'}</div>
          <div class="hist-data">${fmtData(h.ts)}</div>
          ${dur ? `<div class="hist-dur">${dur}</div>` : ''}
        </div>`;
      lista.appendChild(item);
    });
    cont.appendChild(lista);
  }

  // checklist
  checkAtual = Array(CHECKLIST.length).fill(false);
  if (v.checklist) v.checklist.forEach((val,i) => { if(i<checkAtual.length) checkAtual[i]=val; });
  renderChecklist(v.status);
  atualizarProgresso();

  document.getElementById('overlay').classList.add('open');
}

function renderChecklist(statusAtual) {
  const cont = document.getElementById('m-checklist');
  cont.innerHTML = '';
  const secTitle = document.createElement('div');
  secTitle.className = 'section-title';
  secTitle.innerHTML = '✅ Checklist';
  cont.appendChild(secTitle);
  ETAPAS_CHECK.forEach(sec => {
    const isAtual = sec.etapa === statusAtual;
    const itens = CHECKLIST.map((c,i)=>({...c,idx:i})).filter(c=>c.etapa===sec.etapa);
    const wrap = document.createElement('div');
    wrap.className = 'check-section';
    const hdr = document.createElement('div');
    hdr.className = 'check-sec-hdr';
    hdr.innerHTML = `<span>${sec.emoji} ${sec.label}</span><span class="etapa-badge ${isAtual?'etapa-atual':'etapa-outro'}">${isAtual?'etapa atual':'outra etapa'}</span>`;
    wrap.appendChild(hdr);
    itens.forEach(c => {
      const el = document.createElement('div');
      el.className = 'check-item' + (checkAtual[c.idx]?' done':'') + (!isAtual?' dimmed':'');
      el.innerHTML = `<div class="check-box">${checkAtual[c.idx]?'✓':''}</div><span class="check-txt">${c.texto}</span>`;
      el.onclick = () => {
        checkAtual[c.idx] = !checkAtual[c.idx];
        el.classList.toggle('done', checkAtual[c.idx]);
        el.querySelector('.check-box').textContent = checkAtual[c.idx]?'✓':'';
        atualizarProgresso();
      };
      wrap.appendChild(el);
    });
    cont.appendChild(wrap);
  });
}

function atualizarProgresso() {
  const feitos = checkAtual.filter(Boolean).length;
  const total  = checkAtual.length;
  document.getElementById('m-prog-txt').textContent   = feitos+'/'+total;
  document.getElementById('m-prog-fill').style.width = Math.round(feitos/total*100)+'%';
}

window.fecharModalFora = e => {
  if (e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  veiculoAtual = null;
};

window.salvarModal = () => {
  if (!veiculoAtual) return;
  const v = veiculos[veiculoAtual];
  const btnAtivo = document.getElementById('m-status-btns').querySelector('.status-btn.active');
  const novoSt   = btnAtivo?.dataset.status || v.status;
  const mudou    = novoSt !== v.status;
  let hist = v.historico ? [...v.historico] : [];
  if (mudou) {
    const duracaoMs = v.entradaEtapa ? Date.now() - v.entradaEtapa : 0;
    if (hist.length > 0) hist[hist.length-1].duracaoMs = duracaoMs;
    const col = COLUNAS.find(c=>c.status===novoSt);
    hist.push({ etapa:col?.nome||novoSt, emoji:col?.emoji||'', ts:Date.now(), duracaoMs:null });
  }
  update(ref(db,'veiculos/'+veiculoAtual), {
    ...v, status:novoSt, checklist:checkAtual,
    entradaEtapa: mudou ? Date.now() : (v.entradaEtapa||Date.now()),
    historico: hist
  });
  document.getElementById('overlay').classList.remove('open');
  veiculoAtual = null;
};

window.excluirVeiculo = () => {
  if (!veiculoAtual) return;
  if (!confirm('Remover este veículo da esteira?')) return;
  remove(ref(db,'veiculos/'+veiculoAtual));
  document.getElementById('overlay').classList.remove('open');
  veiculoAtual = null;
};

window.adicionarVeiculo = () => {
  const marca  = document.getElementById('f-marca').value.trim().toUpperCase();
  const modelo = document.getElementById('f-modelo').value.trim().toUpperCase();
  if (!modelo) { alert('Informe o modelo.'); return; }
  const status = document.getElementById('f-status').value;
  const col    = COLUNAS.find(c=>c.status===status);
  const now    = Date.now();
  push(veiculosRef, {
    modelo: marca ? marca+' '+modelo : modelo,
    versao:  document.getElementById('f-versao').value.trim().toUpperCase(),
    placa:   document.getElementById('f-placa').value.trim().toUpperCase(),
    cor:     document.getElementById('f-cor').value.trim().toUpperCase(),
    ano:     document.getElementById('f-ano').value.trim(),
    km:      document.getElementById('f-km').value.trim(),
    venda:   document.getElementById('f-venda').value.trim(),
    status, checklist: Array(CHECKLIST.length).fill(false),
    entradaEtapa: now, criadoEm: now,
    historico: [{ etapa:col?.nome||status, emoji:col?.emoji||'', ts:now, duracaoMs:null }]
  });
  ['f-marca','f-modelo','f-versao','f-placa','f-cor','f-ano','f-km','f-venda'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('formWrap').classList.remove('open');
};

onValue(veiculosRef, snap => { veiculos = snap.val()||{}; renderBoard(); });

window.toggleForm  = () => document.getElementById('formWrap').classList.toggle('open');
window.mascaraAno  = el => { let v=el.value.replace(/\D/g,''); if(v.length>4) v=v.slice(0,4)+'/'+v.slice(4,8); el.value=v; };
</script>
</body>
</html>
