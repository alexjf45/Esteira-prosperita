<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AP Esteira">
<meta name="theme-color" content="#090907" id="theme-color-meta">
<title>Auto Prosperità — Esteira</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── DARK (padrão) ── */
:root {
  --bg:#090907;--bg2:#111110;--bg3:#1a1a17;--bg4:#242420;
  --ouro:#c9a84c;--ouro-cl:#e2c36a;--ouro-dk:#7a5e1a;
  --creme:#f0ead8;--cinza:#6b6b60;--cinza2:#3a3a33;
  --borda:rgba(255,255,255,.06);
  --pronto-cl:#52b788;--pronto-bg:rgba(45,106,79,.12);
  --funilaria-cl:#e8924a;--funilaria-bg:rgba(138,79,26,.12);
  --doc-cl:#5b8dd9;--doc-bg:rgba(26,58,106,.12);
  --vistoria-cl:#b06dd9;--vistoria-bg:rgba(90,26,106,.12);
  --venda-cl:#5bc4e8;--venda-bg:rgba(26,74,106,.15);
  --pendencia-cl:#e07a5f;--pendencia-bg:rgba(106,26,26,.15);
  --shadow:none;
  --header-bg:linear-gradient(180deg,#090907 0%,rgba(9,9,7,.95) 100%);
  --nav-bg:#111110;
}
/* ── LIGHT ── */
[data-theme="light"] {
  --bg:#f5f3ee;--bg2:#ffffff;--bg3:#ede9e0;--bg4:#ddd8cc;
  --ouro:#b8922a;--ouro-cl:#9a7520;--ouro-dk:#7a5e1a;
  --creme:#1a1a14;--cinza:#7a7a6a;--cinza2:#c0bdb0;
  --borda:rgba(0,0,0,.07);
  --pronto-cl:#1d6e45;--pronto-bg:rgba(45,106,79,.08);
  --funilaria-cl:#8a4510;--funilaria-bg:rgba(138,79,26,.08);
  --doc-cl:#1a4a8a;--doc-bg:rgba(26,58,106,.08);
  --vistoria-cl:#6a1a8a;--vistoria-bg:rgba(90,26,106,.08);
  --venda-cl:#0a6a8a;--venda-bg:rgba(26,74,106,.08);
  --pendencia-cl:#a03010;--pendencia-bg:rgba(106,26,26,.08);
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --header-bg:linear-gradient(180deg,#f5f3ee 0%,rgba(245,243,238,.97) 100%);
  --nav-bg:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:var(--creme);background:var(--bg);min-height:100vh;min-height:100dvh;overflow-x:hidden;transition:background .3s,color .3s;}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:var(--header-bg);border-bottom:1px solid var(--borda);padding:12px 20px 10px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px);}
.header-brand{display:flex;align-items:center;gap:10px;}
.header-logo{height:36px;width:auto;object-fit:contain;}
.header-sub{font-size:10px;color:var(--cinza);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#52b788;flex-shrink:0;transition:background .3s;}
.sync-dot.syncing{background:var(--ouro);animation:pulse 1s infinite;}
.sync-dot.error{background:#e07a5f;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.btn-add{display:flex;align-items:center;gap:6px;background:var(--ouro);color:#fff;border:none;border-radius:20px;padding:8px 14px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;}
[data-theme="light"] .btn-add{color:#fff;}
.btn-add:active{transform:scale(.96);}

/* THEME TOGGLE */
.theme-btn{background:var(--bg3);border:1px solid var(--borda);color:var(--cinza);width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}

/* NAV BOTTOM */
.nav-bottom{position:fixed;bottom:0;left:0;right:0;z-index:150;background:var(--nav-bg);border-top:1px solid var(--borda);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:var(--shadow);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;cursor:pointer;transition:all .2s;border:none;background:transparent;color:var(--cinza);font-family:'DM Sans',sans-serif;}
.nav-btn.active{color:var(--ouro);}
.nav-btn-icon{font-size:20px;line-height:1;}
.nav-btn-label{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}

/* TELAS */
.tela{display:none;padding-bottom:80px;}
.tela.active{display:block;}

/* TABS */
.tabs{display:flex;gap:6px;padding:14px 20px 10px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--borda);}
.tabs::-webkit-scrollbar{display:none;}
.tab{display:flex;align-items:center;gap:6px;white-space:nowrap;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid transparent;background:var(--bg3);color:var(--cinza);}
.tab.active{background:var(--ouro);color:#fff;}
.tab-count{font-size:10px;font-weight:700;background:rgba(0,0,0,.15);border-radius:10px;padding:1px 6px;}

/* KANBAN */
.kanban{padding:16px 20px;display:flex;flex-direction:column;gap:12px;}

/* COLUNA */
.coluna{border-radius:12px;border:1px solid var(--borda);overflow:hidden;box-shadow:var(--shadow);}
.coluna-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;}
.coluna-left{display:flex;align-items:center;gap:10px;}
.coluna-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.coluna-nome{font-size:13px;font-weight:600;letter-spacing:.3px;}
.coluna-qtd{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(0,0,0,.06);color:var(--cinza);}
.coluna-chevron{font-size:10px;color:var(--cinza);transition:transform .25s;}
.coluna.collapsed .coluna-chevron{transform:rotate(-90deg);}
.coluna-body{display:flex;flex-direction:column;gap:1px;background:var(--borda);overflow:hidden;max-height:2000px;transition:max-height .3s ease;}
.coluna.collapsed .coluna-body{max-height:0;}

.coluna[data-status="pronto"] .coluna-header{background:var(--pronto-bg);}
.coluna[data-status="pronto"] .coluna-dot{background:var(--pronto-cl);}
.coluna[data-status="pronto"] .coluna-nome{color:var(--pronto-cl);}
.coluna[data-status="funilaria"] .coluna-header{background:var(--funilaria-bg);}
.coluna[data-status="funilaria"] .coluna-dot{background:var(--funilaria-cl);}
.coluna[data-status="funilaria"] .coluna-nome{color:var(--funilaria-cl);}
.coluna[data-status="doc"] .coluna-header{background:var(--doc-bg);}
.coluna[data-status="doc"] .coluna-dot{background:var(--doc-cl);}
.coluna[data-status="doc"] .coluna-nome{color:var(--doc-cl);}
.coluna[data-status="vistoria"] .coluna-header{background:var(--vistoria-bg);}
.coluna[data-status="vistoria"] .coluna-dot{background:var(--vistoria-cl);}
.coluna[data-status="vistoria"] .coluna-nome{color:var(--vistoria-cl);}
.coluna[data-status="venda"] .coluna-header{background:var(--venda-bg);}
.coluna[data-status="venda"] .coluna-dot{background:var(--venda-cl);}
.coluna[data-status="venda"] .coluna-nome{color:var(--venda-cl);}

/* CARD */
.card{background:var(--bg2);padding:14px 16px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:12px;}
.card:active{background:var(--bg3);}
.card-thumb{width:46px;height:38px;border-radius:6px;background:var(--bg4);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--borda);}
.card-info{flex:1;min-width:0;}
.card-modelo{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-placa{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--ouro);margin-top:2px;}
.card-meta{font-size:11px;color:var(--cinza);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-badge{display:inline-block;margin-top:4px;font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:6px;text-transform:uppercase;}
.badge-pendencia{background:var(--pendencia-bg);color:var(--pendencia-cl);border:1px solid rgba(224,122,95,.2);}
.card-check{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.card-progress{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--cinza);white-space:nowrap;}
.card-bar{width:36px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.card-bar-fill{height:100%;border-radius:2px;transition:width .3s;}
.card-arrow{color:var(--cinza);font-size:12px;flex-shrink:0;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px);}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid rgba(201,168,76,.15);width:100%;max-height:92vh;max-height:92dvh;overflow-y:auto;transform:translateY(40px);transition:transform .3s cubic-bezier(.32,0,.67,0);padding-bottom:env(safe-area-inset-bottom,20px);}
.overlay.open .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--bg4);margin:12px auto 0;}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--borda);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-modelo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;line-height:1.2;}
.modal-placa{display:inline-block;margin-top:4px;background:var(--ouro);color:#fff;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:4px;}
.modal-close{background:var(--bg3);border:none;color:var(--creme);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}

/* STATUS BTNS */
.modal-status{padding:14px 20px 10px;border-bottom:1px solid var(--borda);}
.modal-status label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--cinza);display:block;margin-bottom:8px;}
.status-btns{display:flex;flex-wrap:wrap;gap:6px;}
.status-btn{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--borda);background:var(--bg3);color:var(--cinza);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.status-btn.sel-pronto{background:var(--pronto-bg);border-color:var(--pronto-cl);color:var(--pronto-cl);}
.status-btn.sel-funilaria{background:var(--funilaria-bg);border-color:var(--funilaria-cl);color:var(--funilaria-cl);}
.status-btn.sel-doc{background:var(--doc-bg);border-color:var(--doc-cl);color:var(--doc-cl);}
.status-btn.sel-vistoria{background:var(--vistoria-bg);border-color:var(--vistoria-cl);color:var(--vistoria-cl);}
.status-btn.sel-venda{background:var(--venda-bg);border-color:var(--venda-cl);color:var(--venda-cl);}

/* PENDÊNCIAS */
.venda-section{padding:14px 20px;border-bottom:1px solid var(--borda);display:none;}
.venda-section.visible{display:block;}
.venda-toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;}
.venda-toggle-title{font-size:13px;font-weight:600;color:var(--pendencia-cl);}
.venda-toggle-sub{font-size:11px;color:var(--cinza);margin-top:2px;}
.toggle-switch{width:44px;height:24px;border-radius:12px;background:var(--bg4);border:1px solid var(--cinza2);position:relative;flex-shrink:0;transition:background .2s;}
.toggle-switch.on{background:var(--pendencia-cl);border-color:var(--pendencia-cl);}
.toggle-switch::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;}
.toggle-switch.on::after{transform:translateX(20px);}
.pendencias-input{margin-top:10px;display:none;}
.venda-section .pendencias-input.visible{display:block;}
textarea.pend-text{width:100%;background:var(--bg3);border:1px solid rgba(224,122,95,.2);border-radius:10px;color:var(--creme);padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;resize:none;height:70px;outline:none;}
textarea.pend-text::placeholder{color:var(--cinza);}

/* BTN PRONTO */
.btn-pronto{margin:12px 20px 0;width:calc(100% - 40px);background:var(--pronto-bg);color:var(--pronto-cl);border:1px solid var(--pronto-cl);border-radius:12px;padding:13px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.btn-pronto:active{opacity:.8;}

/* CHECKLIST */
.checklist-section{padding:14px 20px;}
.checklist-title{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--cinza);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.checklist-progress-text{font-size:11px;font-weight:600;color:var(--ouro);letter-spacing:0;}
.check-group{margin-bottom:16px;}
.check-group-name{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--cinza);margin-bottom:8px;text-transform:uppercase;}
.check-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--borda);cursor:pointer;}
.check-item:last-child{border-bottom:none;}
.check-box{width:20px;height:20px;border-radius:6px;flex-shrink:0;border:1.5px solid var(--cinza2);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.check-box.checked{background:var(--ouro);border-color:var(--ouro);}
.check-box svg{width:11px;height:11px;stroke:#fff;stroke-width:2.5;fill:none;opacity:0;transition:opacity .15s;}
.check-box.checked svg{opacity:1;}
.check-label{font-size:13px;color:var(--creme);transition:color .15s;line-height:1.3;}
.check-item.done .check-label{color:var(--cinza);text-decoration:line-through;}

/* OBS */
.obs-section{padding:0 20px 20px;}
.obs-section label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--cinza);display:block;margin-bottom:8px;}
textarea.obs-input{width:100%;background:var(--bg3);border:1px solid var(--borda);border-radius:10px;color:var(--creme);padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;resize:none;height:80px;outline:none;transition:border-color .2s;}
textarea.obs-input:focus{border-color:rgba(201,168,76,.4);}

.btn-salvar{margin:0 20px 10px;width:calc(100% - 40px);background:var(--ouro);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:.3px;transition:all .2s;}
.btn-salvar:active{transform:scale(.98);}
.btn-excluir{margin:0 20px 20px;width:calc(100% - 40px);background:transparent;color:var(--cinza);border:1px solid var(--borda);border-radius:12px;padding:12px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;}

/* FORM ADD */
.field-group{padding:0 20px 14px;}
.field-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--cinza);display:block;margin-bottom:6px;}
.field-input{width:100%;background:var(--bg3);border:1px solid var(--borda);border-radius:10px;color:var(--creme);padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.field-input:focus{border-color:rgba(201,168,76,.4);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 14px;}
.field-row .field-group{padding:0;}
select.field-input{cursor:pointer;}

/* LOADING */
.loading{text-align:center;padding:40px 20px;color:var(--cinza);font-size:13px;}
.loading-spinner{width:24px;height:24px;border:2px solid rgba(201,168,76,.2);border-top-color:var(--ouro);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:32px 20px;color:var(--cinza);font-size:12px;}
.empty-icon{font-size:28px;margin-bottom:8px;opacity:.4;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg2);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:10px 20px;font-size:12px;color:var(--creme);opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap;box-shadow:var(--shadow);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* PEÇAS */
.pecas-header{padding:20px 20px 0;}
.pecas-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--creme);}
.pecas-sub{font-size:11px;color:var(--cinza);margin-top:2px;}
.pecas-add-row{display:flex;gap:8px;padding:14px 20px;}
.pecas-input{flex:1;background:var(--bg3);border:1px solid var(--borda);border-radius:10px;color:var(--creme);padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.pecas-input:focus{border-color:rgba(201,168,76,.4);}
.pecas-input::placeholder{color:var(--cinza);}
.btn-pecas-add{background:var(--ouro);color:#fff;border:none;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;}
.pecas-seg{margin:0 20px 16px;border-radius:12px;border:1px solid var(--borda);overflow:hidden;box-shadow:var(--shadow);}
.pecas-seg-header{padding:12px 16px;background:var(--bg3);display:flex;align-items:center;justify-content:space-between;}
.pecas-seg-title{font-size:12px;font-weight:600;color:var(--cinza);letter-spacing:.5px;text-transform:uppercase;}
.pecas-seg-count{font-size:10px;color:var(--cinza);background:var(--bg4);padding:2px 8px;border-radius:10px;}
.peca-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-top:1px solid var(--borda);cursor:pointer;transition:background .15s;background:var(--bg2);}
.peca-item:active{background:var(--bg3);}
.peca-check{width:20px;height:20px;border-radius:6px;flex-shrink:0;border:1.5px solid var(--cinza2);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.peca-check.checked{background:var(--pronto-cl);border-color:var(--pronto-cl);}
.peca-check svg{width:11px;height:11px;stroke:#fff;stroke-width:2.5;fill:none;opacity:0;transition:opacity .15s;}
.peca-check.checked svg{opacity:1;}
.peca-nome{flex:1;font-size:13px;color:var(--creme);transition:color .15s;}
.peca-item.comprada .peca-nome{color:var(--cinza);text-decoration:line-through;}
.peca-del{background:none;border:none;color:var(--cinza2);font-size:18px;cursor:pointer;padding:2px 4px;line-height:1;}
.peca-del:active{color:var(--pendencia-cl);}
.peca-car-sel{padding:0 20px 10px;}
.peca-car-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--cinza);display:block;margin-bottom:6px;}
select.peca-car-select{width:100%;background:var(--bg3);border:1px solid var(--borda);border-radius:10px;color:var(--creme);padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;-webkit-appearance:none;cursor:pointer;}
</style>
</head>
<body>

        <div><div class="venda-toggle-title">⚠️ À venda com pendências</div><div class="venda-toggle-sub">Repasse / vendido no estado</div></div>
        <div class="toggle-switch" id="venda-toggle-sw"></div>
      </div>
      <div class="pendencias-input" id="pendencias-input">
        <textarea class="pend-text" id="d-pendencias" placeholder="Descreva as pendências..."></textarea>
      </div>
    </div>
    <button class="btn-pronto" id="btn-marcar-pronto" onclick="marcarPronto()">✅ Marcar como Pronto — mover para À Venda</button>
    <div class="checklist-section">
      <div class="checklist-title"><span>Checklist de Entrada</span><span class="checklist-progress-text" id="d-progress-text"></span></div>
      <div id="d-checklist"></div>
    </div>
    <div class="obs-section">
      <label>Observações</label>
      <textarea class="obs-input" id="d-obs" placeholder="Anotações sobre o veículo..."></textarea>
    </div>
    <button class="btn-salvar" onclick="salvarDetalhe()">Salvar alterações</button>
    <button class="btn-excluir" onclick="excluirVeiculo()">Remover veículo</button>
  </div>
</div>

<!-- MODAL ADD -->
<div class="overlay" id="overlay-add" onclick="fecharAdd(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-modelo" style="font-size:18px">Novo Veículo</div>
      <button class="modal-close" onclick="fecharAdd()">✕</button>
    </div>
    <div style="height:16px"></div>
    <div class="field-group">
      <label class="field-label">Modelo / Marca</label>
      <input class="field-input" id="f-modelo" placeholder="ONIX PLUS 1.0T PREMIER" type="text" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="field-row">
      <div class="field-group"><label class="field-label">Placa</label><input class="field-input" id="f-placa" placeholder="ABC1D23" type="text" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
      <div class="field-group"><label class="field-label">Cor</label><input class="field-input" id="f-cor" placeholder="PRATA" type="text" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
    </div>
    <div class="field-row">
      <div class="field-group"><label class="field-label">Ano</label><input class="field-input" id="f-ano" placeholder="2021/2022" type="text" inputmode="numeric" maxlength="9" oninput="mascaraAno(this)"></div>
      <div class="field-group"><label class="field-label">KM</label><input class="field-input" id="f-km" placeholder="45.000" type="text"></div>
    </div>
    <div class="field-group">
      <label class="field-label">Status inicial</label>
      <select class="field-input" id="f-status">
        <option value="vistoria">🔍 Em Vistoria / Avaliação</option>
        <option value="funilaria">🔧 Funilaria / Mecânica</option>
        <option value="doc">📄 Aguardando Documentos</option>
        <option value="pronto">✅ Pronto (vai para À Venda)</option>
      </select>
    </div>
    <button class="btn-salvar" style="margin-top:6px" onclick="adicionarVeiculo()">Adicionar à esteira</button>
    <div style="height:10px"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, remove, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNInPCmUuqh3VXkIuYX7FyuqpNNmz0BX8",
  authDomain: "auto-prosperita.firebaseapp.com",
  databaseURL: "https://auto-prosperita-default-rtdb.firebaseio.com",
  projectId: "auto-prosperita",
  storageBucket: "auto-prosperita.firebasestorage.app",
  messagingSenderId: "522429666183",
  appId: "1:522429666183:web:31cc54504aebfe363a7922"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const veiculosRef = ref(db,'veiculos');
const pecasRef = ref(db,'pecas');

const CHECKLIST_TEMPLATE = [
  {grupo:"Documentação",itens:["CRV / DUT em mãos","Verificação de multas","Débitos IPVA quitados","Licenciamento em dia","Laudo de vistoria","Chave reserva"]},
  {grupo:"Estética",itens:["Funilaria e pintura","Vidros e espelhos","Faróis e lanternas","Rodas e pneus","Higienização interna","Higienização externa"]},
  {grupo:"Mecânica",itens:["Óleo e filtros","Sistema de freios","Suspensão e direção","Ar-condicionado","Bateria e elétrica","Test drive aprovado"]},
  {grupo:"Fotos e Anúncio",itens:["Fotos externas feitas","Fotos internas feitas","Fotos motor feitas","Anúncio publicado"]}
];
function novoChecklist(){ return CHECKLIST_TEMPLATE.map(g=>({grupo:g.grupo,itens:g.itens.map(n=>({nome:n,feito:false}))})); }

let veiculos={}, pecas={}, filtroAtual='todos', veiculoAtualId=null, vendaPendente=false;

const syncDot=document.getElementById('sync-dot');
function setSyncing(){syncDot.className='sync-dot syncing';}
function setSynced(){syncDot.className='sync-dot';}
function setError(){syncDot.className='sync-dot error';}

onValue(veiculosRef,snap=>{veiculos=snap.val()||{};setSynced();render();atualizarSelectCarros();renderPecas();},()=>setError());
onValue(pecasRef,snap=>{pecas=snap.val()||{};renderPecas();});

// ── TEMA ──────────────────────────────────────────────
function getHora(){ return new Date().getHours(); }
function temaAutomatico(){ return (getHora()>=6&&getHora()<18)?'light':'dark'; }

let temaManual=localStorage.getItem('ap_tema')||null;
function aplicarTema(t){
  document.documentElement.setAttribute('data-theme',t==='light'?'light':'');
  document.getElementById('theme-btn').textContent=t==='light'?'🌙':'☀️';
  document.getElementById('theme-color-meta').content=t==='light'?'#f5f3ee':'#090907';
}
function toggleTheme(){
  const atual=document.documentElement.getAttribute('data-theme')==='light'?'light':'dark';
  temaManual=atual==='light'?'dark':'light';
  localStorage.setItem('ap_tema',temaManual);
  aplicarTema(temaManual);
}
window.toggleTheme=toggleTheme;

// aplicar tema inicial
aplicarTema(temaManual||temaAutomatico());
// checar a cada minuto se mudou de período
setInterval(()=>{ if(!temaManual) aplicarTema(temaAutomatico()); },60000);

// ── NAVEGAÇÃO ──────────────────────────────────────
window.mudarTela=function(tela){
  document.querySelectorAll('.tela').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tela-'+tela).classList.add('active');
  document.getElementById('nav-'+tela).classList.add('active');
  document.getElementById('btn-add-header').style.display=tela==='esteira'?'flex':'none';
}

// ── COLUNAS ─────────────────────────────────────────
const COLUNAS=[
  {status:'vistoria',nome:'🔍 Vistoria / Avaliação',emoji:'🔍'},
  {status:'funilaria',nome:'🔧 Funilaria / Mecânica',emoji:'🔧'},
  {status:'doc',nome:'📄 Aguardando Documentos',emoji:'📋'},
  {status:'pronto',nome:'✅ Pronto para Venda',emoji:'✅'},
  {status:'venda',nome:'🏷️ À Venda',emoji:'🏷️'},
];

function calcProgress(cl){
  if(!cl) return 0;
  let t=0,f=0; cl.forEach(g=>g.itens.forEach(i=>{t++;if(i.feito)f++;}));
  return t===0?0:Math.round(f/t*100);
}
function barColor(p){return p===100?'#52b788':p>=60?'#c9a84c':'#e8924a';}

function render(){
  const kanban=document.getElementById('kanban'); kanban.innerHTML='';
  const arr=Object.entries(veiculos).map(([id,v])=>({...v,id}));
  const counts={todos:arr.length,pronto:0,funilaria:0,doc:0,vistoria:0,venda:0};
  arr.forEach(v=>{if(counts[v.status]!==undefined)counts[v.status]++;});
  Object.keys(counts).forEach(k=>{const el=document.getElementById('cnt-'+k);if(el)el.textContent=counts[k];});
  COLUNAS.forEach(col=>{
    const lista=arr.filter(v=>(filtroAtual==='todos'||filtroAtual===col.status)&&v.status===col.status);
    if(filtroAtual!=='todos'&&filtroAtual!==col.status) return;
    const div=document.createElement('div'); div.className='coluna'+(['funilaria','doc','pronto','venda'].includes(col.status)?' collapsed':''); div.setAttribute('data-status',col.status);
    div.innerHTML=`<div class="coluna-header" onclick="toggleColuna(this)"><div class="coluna-left"><div class="coluna-dot"></div><div class="coluna-nome">${col.nome}</div></div><div style="display:flex;align-items:center;gap:8px"><div class="coluna-qtd">${lista.length}</div><div class="coluna-chevron">▼</div></div></div><div class="coluna-body" id="body-${col.status}"></div>`;
    kanban.appendChild(div);
    const body=document.getElementById('body-'+col.status);
    if(lista.length===0){body.innerHTML=`<div class="empty"><div class="empty-icon">${col.emoji}</div>Nenhum veículo aqui</div>`;}
    else lista.forEach(v=>{
      const prog=calcProgress(v.checklist);
      const card=document.createElement('div'); card.className='card'; card.onclick=()=>abrirDetalhe(v.id);
      const pendBadge=v.vendaPendencias?`<div class="card-badge badge-pendencia">⚠️ Com pendências</div>`:'';
      card.innerHTML=`<div class="card-thumb">${col.emoji}</div><div class="card-info"><div class="card-modelo">${v.modelo}</div><div class="card-placa">${v.placa}</div><div class="card-meta">${v.ano?v.ano+' · ':''}${v.cor||''}${v.km?' · '+v.km+' km':''}</div>${pendBadge}</div><div class="card-check"><div class="card-progress">${prog}%</div><div class="card-bar"><div class="card-bar-fill" style="width:${prog}%;background:${barColor(prog)}"></div></div></div><div class="card-arrow">›</div>`;
      body.appendChild(card);
    });
  });
}

window.toggleColuna=function(h){h.closest('.coluna').classList.toggle('collapsed');}
window.filtrar=function(tab){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');filtroAtual=tab.dataset.filter;render();}

// ── DETALHE ─────────────────────────────────────────
window.abrirDetalhe=function(id){
  const v=veiculos[id]; if(!v) return;
  veiculoAtualId=id; vendaPendente=v.vendaPendencias||false;
  document.getElementById('d-modelo').textContent=v.modelo;
  document.getElementById('d-placa').textContent=v.placa;
  document.getElementById('d-obs').value=v.obs||'';
  document.getElementById('d-pendencias').value=v.pendenciasDesc||'';
  const sb=document.getElementById('d-status-btns'); sb.innerHTML='';
  COLUNAS.forEach(col=>{
    const btn=document.createElement('button');
    btn.className='status-btn'+(v.status===col.status?' sel-'+col.status:'');
    btn.textContent=col.nome;
    btn.onclick=()=>{
      sb.querySelectorAll('.status-btn').forEach(b=>b.className='status-btn');
      btn.className='status-btn sel-'+col.status;
      veiculos[id]={...veiculos[id],status:col.status};
      atualizarBotaoPronte(col.status);
      const vs=document.getElementById('venda-section');
      (col.status==='venda'||col.status==='pronto')?vs.classList.add('visible'):vs.classList.remove('visible');
    };
    sb.appendChild(btn);
  });
  atualizarBotaoPronte(v.status);
  const vs=document.getElementById('venda-section');
  (v.status==='venda'||v.status==='pronto')?vs.classList.add('visible'):vs.classList.remove('visible');
  atualizarToggle(); renderChecklist(v,id);
  document.getElementById('overlay-detalhe').classList.add('open');
  document.body.style.overflow='hidden';
}

function atualizarBotaoPronte(status){
  const btn=document.getElementById('btn-marcar-pronto');
  btn.style.display=status==='venda'?'none':'block';
  if(status==='pronto'){btn.textContent='🏷️ Mover para À Venda';btn.style.background='var(--venda-bg)';btn.style.color='var(--venda-cl)';btn.style.borderColor='var(--venda-cl)';}
  else{btn.textContent='✅ Marcar como Pronto — mover para À Venda';btn.style.background='var(--pronto-bg)';btn.style.color='var(--pronto-cl)';btn.style.borderColor='var(--pronto-cl)';}
}

window.marcarPronto=async function(){
  const v=veiculos[veiculoAtualId]; if(!v) return;
  setSyncing();
  const updated={...v,status:'venda',obs:document.getElementById('d-obs').value,vendaPendencias:vendaPendente,pendenciasDesc:vendaPendente?document.getElementById('d-pendencias').value:''};
  try{
    await set(ref(db,'veiculos/'+veiculoAtualId),updated);
    document.getElementById('overlay-detalhe').classList.remove('open');
    document.body.style.overflow=''; veiculoAtualId=null;
    showToast('🏷️ Movido para À Venda!'); setSynced();
  }catch(e){setError();showToast('Erro ao salvar');}
}

function atualizarToggle(){
  const sw=document.getElementById('venda-toggle-sw');
  const pi=document.getElementById('pendencias-input');
  vendaPendente?sw.classList.add('on'):sw.classList.remove('on');
  vendaPendente?pi.classList.add('visible'):pi.classList.remove('visible');
}
window.toggleVendaPendencias=function(){vendaPendente=!vendaPendente;atualizarToggle();}

function renderChecklist(v,id){
  const container=document.getElementById('d-checklist'); container.innerHTML='';
  const checklist=v.checklist||novoChecklist();
  let total=0,feito=0; checklist.forEach(g=>g.itens.forEach(i=>{total++;if(i.feito)feito++;}));
  document.getElementById('d-progress-text').textContent=feito+'/'+total+' itens';
  checklist.forEach(grupo=>{
    const g=document.createElement('div'); g.className='check-group';
    g.innerHTML=`<div class="check-group-name">${grupo.grupo}</div>`;
    grupo.itens.forEach(item=>{
      const row=document.createElement('div'); row.className='check-item'+(item.feito?' done':'');
      const box=document.createElement('div'); box.className='check-box'+(item.feito?' checked':'');
      box.innerHTML='<svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg>';
      const label=document.createElement('div'); label.className='check-label'; label.textContent=item.nome;
      row.onclick=()=>{item.feito=!item.feito;row.classList.toggle('done',item.feito);box.classList.toggle('checked',item.feito);let t=0,f=0;checklist.forEach(gg=>gg.itens.forEach(i=>{t++;if(i.feito)f++;}));document.getElementById('d-progress-text').textContent=f+'/'+t+' itens';veiculos[id]={...veiculos[id],checklist};};
      row.appendChild(box);row.appendChild(label);g.appendChild(row);
    });
    container.appendChild(g);
  });
}

window.fecharDetalhe=function(e){if(e&&e.target!==document.getElementById('overlay-detalhe'))return;document.getElementById('overlay-detalhe').classList.remove('open');document.body.style.overflow='';veiculoAtualId=null;}

window.salvarDetalhe=async function(){
  const v=veiculos[veiculoAtualId]; if(!v) return;
  setSyncing();
  const updated={...v,obs:document.getElementById('d-obs').value,vendaPendencias:vendaPendente,pendenciasDesc:vendaPendente?document.getElementById('d-pendencias').value:''};
  try{await set(ref(db,'veiculos/'+veiculoAtualId),updated);document.getElementById('overlay-detalhe').classList.remove('open');document.body.style.overflow='';veiculoAtualId=null;showToast('Salvo ✓');setSynced();}catch(e){setError();showToast('Erro ao salvar');}
}

window.excluirVeiculo=async function(){
  if(!confirm('Remover este veículo da esteira?'))return;
  setSyncing();
  try{await remove(ref(db,'veiculos/'+veiculoAtualId));document.getElementById('overlay-detalhe').classList.remove('open');document.body.style.overflow='';veiculoAtualId=null;showToast('Veículo removido');setSynced();}catch(e){setError();showToast('Erro ao remover');}
}

window.mascaraAno=function(i){let v=i.value.replace(/[^0-9]/g,'');if(v.length>4)v=v.slice(0,4)+'/'+v.slice(4,8);i.value=v;}
window.abrirAdd=function(){document.getElementById('overlay-add').classList.add('open');document.body.style.overflow='hidden';setTimeout(()=>document.getElementById('f-modelo').focus(),350);}
window.fecharAdd=function(e){if(e&&e.target!==document.getElementById('overlay-add'))return;document.getElementById('overlay-add').classList.remove('open');document.body.style.overflow='';}

window.adicionarVeiculo=async function(){
  const modelo=document.getElementById('f-modelo').value.trim().toUpperCase();
  const placa=document.getElementById('f-placa').value.trim().toUpperCase();
  if(!modelo||!placa){showToast('Preencha modelo e placa');return;}
  const statusForm=document.getElementById('f-status').value;
  const status=statusForm==='pronto'?'venda':statusForm;
  setSyncing();
  const novo={modelo,placa,cor:document.getElementById('f-cor').value.trim().toUpperCase(),ano:document.getElementById('f-ano').value.trim(),km:document.getElementById('f-km').value.trim(),status,obs:'',vendaPendencias:false,pendenciasDesc:'',checklist:novoChecklist(),criadoEm:Date.now()};
  try{await push(veiculosRef,novo);['f-modelo','f-placa','f-cor','f-ano','f-km'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-status').value='vistoria';document.getElementById('overlay-add').classList.remove('open');document.body.style.overflow='';showToast('Veículo adicionado ✓');setSynced();}catch(e){setError();showToast('Erro ao adicionar');}
}

// ── PEÇAS ─────────────────────────────────────────────
function atualizarSelectCarros(){
  const sel=document.getElementById('peca-car-select');
  const val=sel.value;
  sel.innerHTML='<option value="">— Lista geral —</option>';
  Object.entries(veiculos).forEach(([id,v])=>{const opt=document.createElement('option');opt.value=id;opt.textContent=v.modelo+' · '+v.placa;sel.appendChild(opt);});
  sel.value=val;
}

function renderPecas(){
  const lista=document.getElementById('pecas-lista'); if(!lista) return;
  lista.innerHTML='';
  const arr=Object.entries(pecas).map(([id,p])=>({...p,id}));
  const grupos={};
  arr.forEach(p=>{const key=p.carroId||'__geral__';if(!grupos[key])grupos[key]=[];grupos[key].push(p);});
  const ordemKeys=['__geral__',...Object.keys(grupos).filter(k=>k!=='__geral__')];
  ordemKeys.forEach(key=>{
    const itens=grupos[key]; if(!itens||!itens.length) return;
    const titulo=key==='__geral__'?'Lista Geral':(veiculos[key]?veiculos[key].modelo+' · '+veiculos[key].placa:'Carro removido');
    const pendentes=itens.filter(p=>!p.comprada).length;
    const seg=document.createElement('div'); seg.className='pecas-seg';
    const header=document.createElement('div'); header.className='pecas-seg-header';
    header.innerHTML=`<div class="pecas-seg-title">${titulo}</div><div class="pecas-seg-count">${pendentes} pendente${pendentes!==1?'s':''}</div>`;
    seg.appendChild(header);
    [...itens.filter(p=>!p.comprada),...itens.filter(p=>p.comprada)].forEach(p=>{
      const item=document.createElement('div'); item.className='peca-item'+(p.comprada?' comprada':'');
      const box=document.createElement('div'); box.className='peca-check'+(p.comprada?' checked':'');
      box.innerHTML='<svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg>';
      const nome=document.createElement('div'); nome.className='peca-nome'; nome.textContent=p.nome;
      const del=document.createElement('button'); del.className='peca-del'; del.textContent='×';
      del.onclick=async(e)=>{e.stopPropagation();if(confirm('Remover esta peça?')){await remove(ref(db,'pecas/'+p.id));showToast('Peça removida');}};
      item.onclick=async()=>{p.comprada=!p.comprada;await set(ref(db,'pecas/'+p.id),{...p});showToast(p.comprada?'✓ Comprada':'Desmarcada');};
      item.appendChild(box);item.appendChild(nome);item.appendChild(del);seg.appendChild(item);
    });
    lista.appendChild(seg);
  });
  if(!arr.length) lista.innerHTML='<div class="empty" style="margin:20px"><div class="empty-icon">🔩</div>Nenhuma peça na lista</div>';
}

window.adicionarPeca=async function(){
  const input=document.getElementById('peca-nova-input');
  const nome=input.value.trim().toUpperCase();
  if(!nome){showToast('Digite o nome da peça');return;}
  const carroId=document.getElementById('peca-car-select').value||null;
  setSyncing();
  try{await push(pecasRef,{nome,carroId,comprada:false,criadoEm:Date.now()});input.value='';showToast('Peça adicionada ✓');setSynced();}catch(e){setError();showToast('Erro ao adicionar');}
}
document.getElementById('peca-nova-input').addEventListener('keydown',e=>{if(e.key==='Enter')window.adicionarPeca();});

window.showToast=function(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
</html>
