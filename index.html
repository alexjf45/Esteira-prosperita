<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Auto Prosperità — Esteira</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#C9A84C; --gold-light:#E8C97A; --gold-dark:#8B6914;
  --bg:#0E0E10; --bg2:#16161A; --bg3:#1E1E24; --bg4:#26262E;
  --text:#F0EDE6; --text2:#A09A8E; --text3:#5C5850; --border:#2A2A34;
  --yellow:#F5C842; --red:#E05252; --red-bg:#2A1414; --yellow-bg:#221E0A;
  --green:#4CAF7D; --green-bg:#0E1F16; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;}
.header-logo span{color:var(--gold);}
.btn-icon{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s;}
.btn-icon:hover{border-color:var(--gold);color:var(--gold);}

/* LEGENDA */
.legenda{display:flex;gap:12px;align-items:center;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.leg-ok{background:var(--bg4);border:1px solid var(--border);}
.leg-warn{background:var(--yellow);}
.leg-crit{background:var(--red);}

/* BOARD */
.board{padding:12px;display:flex;flex-direction:column;gap:10px;}

/* COLUNA */
.coluna{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.coluna-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none;transition:background .15s;}
.coluna-header:hover{background:var(--bg3);}
.col-title-wrap{display:flex;align-items:center;gap:8px;}
.col-emoji{font-size:16px;}
.col-nome{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.3px;}
.col-meta{display:flex;align-items:center;gap:8px;}
.col-count{background:var(--bg4);border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;min-width:24px;text-align:center;}
.col-count.alerta{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.col-chevron{color:var(--text3);font-size:12px;transition:transform .2s;}
.coluna.collapsed .col-chevron{transform:rotate(-90deg);}
.coluna-body{padding:0 10px 10px;display:flex;flex-direction:column;gap:8px;}
.coluna.collapsed .coluna-body{display:none;}

/* CARD */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s;}
.card:active{transform:scale(.98);}
.card.warn-y{border-left:3px solid var(--yellow);}
.card.warn-r{border-left:3px solid var(--red);background:#1A1614;}
.card-top{padding:10px 12px 8px;}
.card-modelo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;}
.card-info{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:600;color:var(--text2);background:var(--bg4);border:1px solid var(--border);padding:2px 6px;border-radius:4px;}
.card-prazo{display:flex;align-items:center;gap:5px;padding:5px 12px;border-top:1px solid var(--border);font-size:11px;font-weight:600;}
.card-prazo.ok{color:var(--text3);}
.card-prazo.warn{color:var(--yellow);background:var(--yellow-bg);}
.card-prazo.crit{color:var(--red);background:var(--red-bg);}
.prog-bar-mini{height:3px;background:var(--border);}
.prog-bar-mini-fill{height:100%;background:var(--gold);transition:width .3s;}

/* FORM */
.form-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:4px;display:none;}
.form-wrap.open{display:block;}
.form-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.field-row{display:flex;gap:8px;margin-bottom:8px;}
.field-group{flex:1;display:flex;flex-direction:column;}
.field-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.field-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:9px 10px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;width:100%;transition:border-color .15s;}
.field-input:focus{border-color:var(--gold);}
.field-input option{background:var(--bg3);}
.btn-salvar{width:100%;background:var(--gold);color:#000;border:none;padding:11px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;margin-top:4px;}
.btn-salvar:active{opacity:.8;}
.btn-add{width:100%;background:transparent;border:1px dashed var(--border);color:var(--text3);border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.btn-add:hover{border-color:var(--gold);color:var(--gold);}
.vazio{text-align:center;padding:20px 10px;color:var(--text3);font-size:13px;}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:16px;transform:translateY(20px);transition:transform .25s;}
.overlay.open .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;margin-bottom:2px;}
.modal-sub{color:var(--text2);font-size:12px;margin-bottom:14px;}

/* PRAZO CARD MODAL */
.prazo-card{border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.prazo-card.ok{background:var(--bg3);border:1px solid var(--border);}
.prazo-card.warn{background:var(--yellow-bg);border:1px solid var(--yellow);}
.prazo-card.crit{background:var(--red-bg);border:1px solid var(--red);}
.prazo-card-icon{font-size:22px;}
.prazo-card-txt b{display:block;font-size:14px;font-weight:700;}
.prazo-card.ok .prazo-card-txt b{color:var(--text2);}
.prazo-card.warn .prazo-card-txt b{color:var(--yellow);}
.prazo-card.crit .prazo-card-txt b{color:var(--red);}
.prazo-card-txt small{font-size:11px;opacity:.7;}

/* HISTÓRICO */
.hist-section{margin-bottom:14px;}
.hist-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:8px;}
.hist-list{display:flex;flex-direction:column;gap:0;}
.hist-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.hist-item:last-child{border-bottom:none;}
.hist-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);margin-top:4px;flex-shrink:0;}
.hist-dot.entrada{background:var(--green);}
.hist-info{flex:1;}
.hist-etapa{font-size:13px;font-weight:600;}
.hist-data{font-size:11px;color:var(--text3);margin-top:1px;}
.hist-dur{font-size:11px;color:var(--text2);margin-top:1px;}
.hist-vazio{font-size:12px;color:var(--text3);padding:8px 0;}

/* STATUS BTNS */
.status-wrap{margin-bottom:14px;}
.status-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.status-btns{display:flex;gap:6px;flex-wrap:wrap;}
.status-btn{font-size:12px;font-weight:600;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;}
.status-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1);}

/* CHECKLIST */
.check-section{margin-bottom:14px;}
.check-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.check-section-title .etapa-badge{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;}
.etapa-atual{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3);}
.etapa-outro{background:var(--bg4);color:var(--text3);border:1px solid var(--border);}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);margin-bottom:4px;cursor:pointer;}
.check-item:active{background:var(--bg4);}
.check-item.dimmed{opacity:.45;}
.check-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;}
.check-item.done .check-box{background:var(--gold);border-color:var(--gold);color:#000;}
.check-item.done .check-txt{text-decoration:line-through;color:var(--text3);}
.check-txt{font-size:13px;}

/* PROGRESSO */
.prog-wrap{margin-bottom:14px;}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px;}
.prog-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));border-radius:3px;transition:width .3s;}

/* AÇÕES */
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-action{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border:none;}
.btn-action:active{opacity:.8;}
.btn-primary{background:var(--gold);color:#000;}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">AUTO <span>PROSPERITÀ</span></div>
  <button class="btn-icon" onclick="toggleForm()" title="Adicionar">＋</button>
</div>

<div class="legenda">
  <span style="font-weight:600;color:var(--text)">Prazo:</span>
  <div class="leg-item"><div class="leg-dot leg-ok"></div>Normal</div>
  <div class="leg-item"><div class="leg-dot leg-warn"></div>+3 dias</div>
  <div class="leg-item"><div class="leg-dot leg-crit"></div>+7 dias</div>
</div>

<div class="board">

  <div class="form-wrap" id="formWrap">
    <div class="form-title">➕ Novo Veículo</div>
    <div class="field-row" style="margin-bottom:8px">
      <div class="field-group">
        <label class="field-label">Modelo / Marca</label>
        <input class="field-input" id="f-modelo" placeholder="ONIX PLUS 1.0T PREMIER" oninput="this.value=this.value.toUpperCase()">
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Placa</label>
        <input class="field-input" id="f-placa" placeholder="ABC1D23" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="field-group">
        <label class="field-label">Cor</label>
        <input class="field-input" id="f-cor" placeholder="PRATA" oninput="this.value=this.value.toUpperCase()">
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Ano</label>
        <input class="field-input" id="f-ano" placeholder="2021/2022" inputmode="numeric" maxlength="9" oninput="mascaraAno(this)">
      </div>
      <div class="field-group">
        <label class="field-label">KM</label>
        <input class="field-input" id="f-km" placeholder="45.000">
      </div>
    </div>
    <div class="field-group" style="margin-bottom:10px">
      <label class="field-label">Status inicial</label>
      <select class="field-input" id="f-status">
        <option value="vistoria">🔍 Vistoria / Avaliação</option>
        <option value="funilaria">🔧 Funilaria / Mecânica</option>
        <option value="doc">📄 Aguardando Documentos</option>
      </select>
    </div>
    <button class="btn-salvar" onclick="adicionarVeiculo()">Adicionar à esteira</button>
  </div>

  <div id="colunas"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="fecharModalFora(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="m-titulo"></div>
    <div class="modal-sub" id="m-sub"></div>

    <div class="prazo-card" id="m-prazo">
      <div class="prazo-card-icon" id="m-prazo-icon"></div>
      <div class="prazo-card-txt">
        <b id="m-prazo-txt"></b>
        <small id="m-prazo-detalhe"></small>
      </div>
    </div>

    <div class="prog-wrap">
      <div class="prog-label"><span>Checklist geral</span><span id="m-prog-txt">0/0</span></div>
      <div class="prog-bar"><div class="prog-fill" id="m-prog-fill" style="width:0%"></div></div>
    </div>

    <div class="status-wrap">
      <div class="status-label">Mover para etapa</div>
      <div class="status-btns" id="m-status-btns"></div>
    </div>

    <div class="hist-section">
      <div class="hist-title">📋 Histórico de movimentação</div>
      <div id="m-historico"></div>
    </div>

    <div id="m-checklist"></div>

    <div class="modal-actions">
      <button class="btn-action btn-primary" onclick="salvarModal()">Salvar</button>
      <button class="btn-action btn-danger" onclick="excluirVeiculo()">Excluir</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNInPCmUuqh3VXkIuYX7FyuqpNNmz0BX8",
  authDomain: "auto-prosperita.firebaseapp.com",
  databaseURL: "https://auto-prosperita-default-rtdb.firebaseio.com",
  projectId: "auto-prosperita",
  storageBucket: "auto-prosperita.firebasestorage.app",
  messagingSenderId: "522429666183",
  appId: "1:522429666183:web:31cc54504aebfe363a7922"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const veiculosRef = ref(db, 'veiculos');

// ── PRAZO ──────────────────────────────────────────────────
const PRAZO_WARN = 3;
const PRAZO_CRIT = 7;

function diasNaEtapa(v) {
  if (!v.entradaEtapa) return 0;
  return Math.floor((Date.now() - v.entradaEtapa) / 86400000);
}
function prazoClass(dias) {
  return dias >= PRAZO_CRIT ? 'crit' : dias >= PRAZO_WARN ? 'warn' : 'ok';
}
function prazoIcon(cls) {
  return cls === 'crit' ? '🔴' : cls === 'warn' ? '🟡' : '⚪';
}
function prazoTexto(dias, etapaNome) {
  const d = dias === 0 ? 'hoje' : dias === 1 ? '1 dia' : `${dias} dias`;
  return dias === 0 ? `Entrou hoje em ${etapaNome}` : `${etapaNome} há ${d}`;
}

// ── CHECKLIST POR ETAPA ────────────────────────────────────
// Cada item tem: texto, etapa associada (null = geral)
const CHECKLIST = [
  // VISTORIA
  { texto:'Vistoria estrutural feita',           etapa:'vistoria'  },
  { texto:'Motor e câmbio verificados',          etapa:'vistoria'  },
  { texto:'Pneus e suspensão OK',                etapa:'vistoria'  },
  { texto:'Elétrica verificada',                 etapa:'vistoria'  },
  { texto:'Ar-condicionado testado',             etapa:'vistoria'  },
  // FUNILARIA
  { texto:'Lataria inspecionada',                etapa:'funilaria' },
  { texto:'Pintura aprovada / em andamento',     etapa:'funilaria' },
  { texto:'Funilaria concluída',                 etapa:'funilaria' },
  // DOCUMENTAÇÃO
  { texto:'CRV / DUT em mão',                   etapa:'doc'       },
  { texto:'Multas verificadas',                  etapa:'doc'       },
  { texto:'Licenciamento em dia',                etapa:'doc'       },
  { texto:'Restrições no Detran verificadas',    etapa:'doc'       },
  { texto:'IPVA em dia',                         etapa:'doc'       },
  // VENDA
  { texto:'Higienização completa',               etapa:'venda'     },
  { texto:'Fotos feitas',                        etapa:'venda'     },
  { texto:'Preço definido',                      etapa:'venda'     },
  { texto:'Anúncio publicado',                   etapa:'venda'     },
  { texto:'Contrato assinado',                   etapa:'venda'     },
  { texto:'Pagamento confirmado',                etapa:'venda'     },
  { texto:'Chave e documentação entregues',      etapa:'venda'     },
];

const ETAPAS_CHECK = [
  { etapa:'vistoria',  label:'Vistoria',     emoji:'🔍' },
  { etapa:'funilaria', label:'Funilaria',    emoji:'🔧' },
  { etapa:'doc',       label:'Documentação', emoji:'📄' },
  { etapa:'venda',     label:'Venda',        emoji:'🏷️' },
];

// ── COLUNAS ────────────────────────────────────────────────
const COLUNAS = [
  { status:'vistoria',  nome:'Vistoria / Avaliação', emoji:'🔍' },
  { status:'funilaria', nome:'Funilaria / Mecânica',  emoji:'🔧' },
  { status:'doc',       nome:'Aguardando Documentos', emoji:'📄' },
  { status:'venda',     nome:'À Venda',               emoji:'🏷️' },
];

// ── ESTADO ─────────────────────────────────────────────────
let veiculos = {};
let veiculoAtual = null;
let checkAtual = [];

// ── DATAS ──────────────────────────────────────────────────
function fmtData(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})
    + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function nomEtapa(status) {
  return COLUNAS.find(c => c.status === status)?.nome || status;
}
function duracao(ms) {
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  if (d > 0) return `${d}d ${h}h`;
  return `${h}h`;
}

// ── RENDER BOARD ───────────────────────────────────────────
function renderBoard() {
  const cont = document.getElementById('colunas');
  cont.innerHTML = '';
  COLUNAS.forEach(col => {
    const lista = Object.entries(veiculos)
      .filter(([,v]) => v.status === col.status)
      .sort((a,b) => (a[1].entradaEtapa||0) - (b[1].entradaEtapa||0));

    const alertCount = lista.filter(([,v]) => diasNaEtapa(v) >= PRAZO_WARN).length;

    const div = document.createElement('div');
    div.className = 'coluna collapsed';

    const hdr = document.createElement('div');
    hdr.className = 'coluna-header';
    hdr.innerHTML = `
      <div class="col-title-wrap">
        <span class="col-emoji">${col.emoji}</span>
        <span class="col-nome">${col.nome}</span>
      </div>
      <div class="col-meta">
        <span class="col-count${alertCount>0?' alerta':''}">${lista.length}</span>
        <span class="col-chevron">▼</span>
      </div>`;
    hdr.onclick = () => div.classList.toggle('collapsed');
    div.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'coluna-body';

    if (lista.length === 0) {
      body.innerHTML = '<div class="vazio">Nenhum veículo nesta etapa</div>';
    } else {
      lista.forEach(([id, v]) => {
        const dias = diasNaEtapa(v);
        const cls  = prazoClass(dias);
        const total = CHECKLIST.length;
        const feitos = (v.checklist||[]).filter(Boolean).length;
        const pct = Math.round(feitos/total*100);

        const card = document.createElement('div');
        card.className = `card${cls==='warn'?' warn-y':cls==='crit'?' warn-r':''}`;
        card.innerHTML = `
          <div class="card-top">
            <div class="card-modelo">${v.modelo||'—'}</div>
            <div class="card-info">
              ${v.placa?`<span class="badge">${v.placa}</span>`:''}
              ${v.ano?`<span class="badge">${v.ano}</span>`:''}
              ${v.cor?`<span class="badge">${v.cor}</span>`:''}
              ${v.km?`<span class="badge">${v.km} km</span>`:''}
            </div>
          </div>
          <div class="card-prazo ${cls}">
            <span>${prazoIcon(cls)}</span>
            ${prazoTexto(dias, col.nome)}
          </div>
          <div class="prog-bar-mini">
            <div class="prog-bar-mini-fill" style="width:${pct}%"></div>
          </div>`;
        card.onclick = () => abrirModal(id);
        body.appendChild(card);
      });
    }

    const btnAdd = document.createElement('button');
    btnAdd.className = 'btn-add';
    btnAdd.textContent = '＋ Adicionar veículo';
    btnAdd.onclick = () => {
      document.getElementById('f-status').value = col.status;
      document.getElementById('formWrap').classList.add('open');
      document.getElementById('formWrap').scrollIntoView({behavior:'smooth'});
    };
    body.appendChild(btnAdd);
    div.appendChild(body);
    cont.appendChild(div);
  });
}

// ── MODAL ──────────────────────────────────────────────────
function abrirModal(id) {
  veiculoAtual = id;
  const v = veiculos[id];
  const dias = diasNaEtapa(v);
  const cls  = prazoClass(dias);
  const etapaNome = nomEtapa(v.status);

  document.getElementById('m-titulo').textContent = v.modelo || '—';
  document.getElementById('m-sub').textContent =
    [v.placa,v.ano,v.cor,v.km?v.km+' km':''].filter(Boolean).join(' · ');

  // prazo
  const pc = document.getElementById('m-prazo');
  pc.className = `prazo-card ${cls}`;
  document.getElementById('m-prazo-icon').textContent = prazoIcon(cls);
  document.getElementById('m-prazo-txt').textContent = prazoTexto(dias, etapaNome);
  const msgs = {
    ok:'Dentro do prazo normal ✓',
    warn:'Atenção: mais de 3 dias nesta etapa',
    crit:'Urgente: passou de 7 dias — verifique o gargalo'
  };
  document.getElementById('m-prazo-detalhe').textContent = msgs[cls];

  // status btns
  const sb = document.getElementById('m-status-btns');
  sb.innerHTML = '';
  COLUNAS.forEach(col => {
    const b = document.createElement('button');
    b.className = `status-btn${v.status===col.status?' active':''}`;
    b.dataset.status = col.status;
    b.textContent = `${col.emoji} ${col.nome}`;
    b.onclick = () => {
      sb.querySelectorAll('.status-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    };
    sb.appendChild(b);
  });

  // histórico
  renderHistorico(v);

  // checklist
  checkAtual = Array(CHECKLIST.length).fill(false);
  if (v.checklist) v.checklist.forEach((val,i) => { if(i<checkAtual.length) checkAtual[i]=val; });
  renderChecklist(v.status);
  atualizarProgresso();

  document.getElementById('overlay').classList.add('open');
}

function renderHistorico(v) {
  const cont = document.getElementById('m-historico');
  const hist  = v.historico || [];
  if (hist.length === 0) {
    cont.innerHTML = '<div class="hist-vazio">Nenhuma movimentação registrada ainda.</div>';
    return;
  }
  // ordenar do mais recente
  const sorted = [...hist].sort((a,b) => (b.ts||0)-(a.ts||0));
  cont.innerHTML = '';
  sorted.forEach((h,i) => {
    const item = document.createElement('div');
    item.className = 'hist-item';
    const durou = h.duracaoMs ? `Ficou ${duracao(h.duracaoMs)} nesta etapa` : '';
    item.innerHTML = `
      <div class="hist-dot${i===0?' entrada':''}"></div>
      <div class="hist-info">
        <div class="hist-etapa">${h.emoji||''} ${h.etapa||'—'}</div>
        <div class="hist-data">${fmtData(h.ts)}</div>
        ${durou?`<div class="hist-dur">${durou}</div>`:''}
      </div>`;
    cont.appendChild(item);
  });
}

function renderChecklist(statusAtual) {
  const cont = document.getElementById('m-checklist');
  cont.innerHTML = '';
  ETAPAS_CHECK.forEach(sec => {
    const isAtual = sec.etapa === statusAtual;
    const itens = CHECKLIST.map((c,i)=>({...c,idx:i})).filter(c=>c.etapa===sec.etapa);

    const wrap = document.createElement('div');
    wrap.className = 'check-section';

    const title = document.createElement('div');
    title.className = 'check-section-title';
    title.innerHTML = `
      <span>${sec.emoji} ${sec.label}</span>
      <span class="etapa-badge ${isAtual?'etapa-atual':'etapa-outro'}">${isAtual?'etapa atual':'outra etapa'}</span>`;
    wrap.appendChild(title);

    itens.forEach(c => {
      const el = document.createElement('div');
      el.className = `check-item${checkAtual[c.idx]?' done':''}${!isAtual?' dimmed':''}`;
      el.innerHTML = `<div class="check-box">${checkAtual[c.idx]?'✓':''}</div><span class="check-txt">${c.texto}</span>`;
      el.onclick = () => {
        checkAtual[c.idx] = !checkAtual[c.idx];
        el.classList.toggle('done', checkAtual[c.idx]);
        el.querySelector('.check-box').textContent = checkAtual[c.idx]?'✓':'';
        atualizarProgresso();
      };
      wrap.appendChild(el);
    });
    cont.appendChild(wrap);
  });
}

function atualizarProgresso() {
  const feitos = checkAtual.filter(Boolean).length;
  const total  = checkAtual.length;
  const pct    = total>0?Math.round(feitos/total*100):0;
  document.getElementById('m-prog-txt').textContent = `${feitos}/${total}`;
  document.getElementById('m-prog-fill').style.width = pct+'%';
}

window.fecharModalFora = function(e) {
  if (e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  veiculoAtual = null;
};

window.salvarModal = function() {
  if (!veiculoAtual) return;
  const v = veiculos[veiculoAtual];
  const btnAtivo = document.getElementById('m-status-btns').querySelector('.status-btn.active');
  const novoSt   = btnAtivo?.dataset.status || v.status;
  const mudou    = novoSt !== v.status;

  let hist = v.historico ? [...v.historico] : [];

  if (mudou) {
    // registrar quanto tempo ficou na etapa anterior
    const duracaoMs = v.entradaEtapa ? Date.now() - v.entradaEtapa : 0;
    // atualizar duração na última entrada do histórico
    if (hist.length > 0 && hist[hist.length-1].etapa === nomEtapa(v.status)) {
      hist[hist.length-1].duracaoMs = duracaoMs;
    }
    // adicionar nova entrada
    const col = COLUNAS.find(c=>c.status===novoSt);
    hist.push({ etapa: col?.nome||novoSt, emoji: col?.emoji||'', ts: Date.now(), duracaoMs: null });
  }

  const upd = {
    ...v,
    status: novoSt,
    checklist: checkAtual,
    entradaEtapa: mudou ? Date.now() : (v.entradaEtapa||Date.now()),
    historico: hist
  };

  update(ref(db, `veiculos/${veiculoAtual}`), upd);
  document.getElementById('overlay').classList.remove('open');
  veiculoAtual = null;
};

window.excluirVeiculo = function() {
  if (!veiculoAtual) return;
  if (!confirm('Remover este veículo da esteira?')) return;
  remove(ref(db, `veiculos/${veiculoAtual}`));
  document.getElementById('overlay').classList.remove('open');
  veiculoAtual = null;
};

// ── ADICIONAR ──────────────────────────────────────────────
window.adicionarVeiculo = function() {
  const modelo = document.getElementById('f-modelo').value.trim().toUpperCase();
  if (!modelo) { alert('Informe o modelo.'); return; }
  const status = document.getElementById('f-status').value;
  const col    = COLUNAS.find(c=>c.status===status);
  const now    = Date.now();

  const v = {
    modelo,
    placa:  document.getElementById('f-placa').value.trim().toUpperCase(),
    cor:    document.getElementById('f-cor').value.trim().toUpperCase(),
    ano:    document.getElementById('f-ano').value.trim(),
    km:     document.getElementById('f-km').value.trim(),
    status,
    checklist: Array(CHECKLIST.length).fill(false),
    entradaEtapa: now,
    criadoEm: now,
    historico: [{ etapa: col?.nome||status, emoji: col?.emoji||'', ts: now, duracaoMs: null }]
  };

  push(veiculosRef, v);
  ['f-modelo','f-placa','f-cor','f-ano','f-km'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('formWrap').classList.remove('open');
};

// ── FIREBASE ───────────────────────────────────────────────
onValue(veiculosRef, snap => {
  veiculos = snap.val() || {};
  renderBoard();
});

// ── GLOBALS ────────────────────────────────────────────────
window.toggleForm  = () => document.getElementById('formWrap').classList.toggle('open');
window.mascaraAno  = el => {
  let v = el.value.replace(/\D/g,'');
  if (v.length > 4) v = v.slice(0,4)+'/'+v.slice(4,8);
  el.value = v;
};
</script>
